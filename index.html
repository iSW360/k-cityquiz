<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 도시 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GHNJJFEVBD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-GHNJJFEVBD');
    </script>

        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vqh5drw2xf");

</head>

<body class="bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100 flex flex-col items-center justify-center min-h-[90vh] p-2 sm:p-3 selection:bg-blue-200">

    <div id="difficulty-selector" class="bg-white p-4 sm:p-6 rounded-xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 pb-4">
            대한민국 도시 퀴즈
        </h1>
        <h2 class="text-xl font-semibold text-gray-700 mb-5">난이도를 선택하세요</h2>
        <div class="flex flex-col gap-3">
            <button id="level-1-btn" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all text-lg">
                난이도 1 <span class="font-normal text-base">(보기 4개)</span>
            </button>
            <button id="level-2-btn" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all text-lg">
                난이도 2 <span class="font-normal text-base">(보기 8개)</span>
            </button>
            <div class="mt-4 pt-4 border-t border-gray-100">
                <a href="seoul.html" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                    서울 구 퀴즈 하러 가기
                </a>
            </div>
        </div>
    </div>

    <div id="quiz-container" class="bg-white p-4 sm:p-5 rounded-xl shadow-xl w-full max-w-3xl" style="display: none;">

        <header class="mb-3 text-center">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 pb-2">
            대한민국 도시 퀴즈
            </h1>
        </header>
        
        <main>
            <div id="map" class="mb-2"></div>

            <div id="question-area" class="text-center mb-2 h-12 flex items-center justify-center">
                <p id="question-text" class="text-lg sm:text-xl font-semibold text-gray-700">게임 시작 버튼을 눌러 주세요!</p>
            </div>

            <div id="options-area" class="grid grid-cols-4 gap-2 mb-4"></div>

            <div id="feedback-area" class="text-center mb-4 h-8 flex items-center justify-center">
                <p id="feedback-text" class="text-md sm:text-lg font-medium"></p>
            </div>
            
            <div id="progress-area" class="text-center mb-4">
                <p class="text-base sm:text-lg text-gray-800">문제: <span id="current-question" class="font-bold text-blue-600">0</span> / <span id="total-questions" class="font-bold text-gray-600">0</span></p>
            </div>

            <div class="flex flex-row flex-nowrap justify-center items-center gap-3">
                <button id="restart-btn" class="bg-gradient-to-r from-gray-500 to-gray-600 hover:from-gray-600 hover:to-gray-700 text-white font-semibold py-2 px-4 rounded-lg shadow-md hover:shadow-lg transition-all text-sm">
                    처음으로
                </button>
                <button id="next-question-btn" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-2 px-4 rounded-lg shadow-md hover:shadow-lg transition-all text-sm" style="display: none;">
                    다음 문제
                </button>
            </div>
        </main>
    
        <section class="mt-8 pt-6 border-t border-gray-100 w-full">
            <h3 class="text-lg font-bold text-gray-800 mb-4 text-center">제휴 및 문의</h3>
            <form action="https://formspree.io/f/mreyekwv" method="POST" class="flex flex-col gap-3 max-w-sm mx-auto">
                <div class="flex flex-col gap-1">
                    <label for="name" class="text-xs font-semibold text-gray-500 ml-1">이름/업체명</label>
                    <input type="text" name="name" id="name" required placeholder="홍길동" class="px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                </div>
                <div class="flex flex-col gap-1">
                    <label for="email" class="text-xs font-semibold text-gray-500 ml-1">이메일 주소</label>
                    <input type="email" name="_replyto" id="email" required placeholder="example@email.com" class="px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                </div>
                <div class="flex flex-col gap-1">
                    <label for="message" class="text-xs font-semibold text-gray-500 ml-1">문의 내용</label>
                    <textarea name="message" id="message" required rows="3" placeholder="제휴 문의 내용을 적어주세요." class="px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all resize-none"></textarea>
                </div>
                <button type="submit" class="mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg shadow-md hover:shadow-lg transition-all text-sm">
                    문의 보내기
                </button>
            </form>
        </section>

        <div class="mt-6 text-center">
            <a href="https://smartstore.naver.com/shopelena" target="_blank" style="font-size: 14px; color: purple; text-decoration: none;">
                Presented by Shop Elena
            </a>
        </div>

        <section class="mt-10 pt-6 border-t border-gray-100 w-full">
            <h3 class="text-lg font-bold text-gray-800 mb-6 text-center">댓글 및 피드백</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                var disqus_config = function () {
                    this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = 'k-cityquiz-main'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://k-cityquiz.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>

        <footer class="mt-8 text-center">
            <p class="text-xs text-gray-400">
                지도 타일: &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" class="underline hover:text-blue-600">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions" target="_blank" class="underline hover:text-blue-600">CARTO</a>.
                행정구역 데이터: <a href="https://github.com/southkorea/southkorea-maps" target="_blank" class="underline hover:text-blue-600">southkorea-maps (2024년 행정구역 명칭 반영)</a>.
            </p>
            <p id="map-error-info" class="text-xs text-red-500 mt-1"></p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
