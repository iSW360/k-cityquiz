<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul District Quiz | Geography Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 sm:p-6 selection:bg-indigo-200">
    <div id="difficulty-selector" class="glass-card p-6 sm:p-10 w-full max-w-lg text-center relative overflow-hidden z-10">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
        <h1 class="text-3xl font-extrabold mb-2 tracking-tight text-gradient">Seoul District Quiz</h1>
        <p class="text-gray-500 font-medium mb-8">Test your knowledge of Seoul's 25 districts!</p>
        <div class="grid grid-cols-2 gap-4 mt-4">
            <button id="level-1-btn" class="bg-white text-blue-600 border-2 border-blue-100 font-bold py-2 px-4 rounded-2xl shadow-sm">Level 1</button>
            <button id="level-2-btn" class="btn-modern bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-2 px-4 rounded-2xl shadow-lg">Level 2</button>
        </div>
        <div class="mt-6 pt-6 border-t border-gray-100 flex justify-center">
            <a href="index_en.html" class="text-xs font-semibold text-gray-400 hover:text-gray-600">🏠 Back to Home</a>
        </div>
    </div>

    <div id="quiz-container" class="glass-card p-4 sm:p-8 w-full max-w-4xl z-10" style="display: none;">
        <header class="mb-6 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gradient">Seoul Quiz In Progress</h2>
            <div id="progress-area" class="bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">
                <span class="text-sm font-bold text-blue-600"><span id="current-question">0</span> / <span id="total-questions">0</span></span>
            </div>
        </header>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7"><div id="map"></div></div>
            <div class="lg:col-span-5 flex flex-col justify-between">
                <div id="question-area" class="text-center mb-6 bg-white/50 p-4 rounded-2xl">
                    <p id="question-text" class="text-xl font-bold text-gray-800 mb-2">Where is this district?</p>
                    <button id="hint-btn" class="mx-auto text-xs bg-amber-50 text-amber-700 border border-amber-200 px-4 py-1.5 rounded-full">💡 Hint</button>
                </div>
                <div id="options-area" class="grid grid-cols-2 gap-2 mb-6"></div>
                <div id="feedback-area" class="text-center min-h-[2rem] mb-4"><p id="feedback-text" class="text-base font-bold"></p></div>
                <div class="flex gap-3">
                    <button id="restart-btn" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Restart</button>
                    <button id="next-question-btn" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl shadow-lg" style="display: none;">Next</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-16 pb-10 text-center w-full max-w-4xl z-10">
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <a href="https://tally.so/r/n0PvWl" target="_blank" class="text-[11px] font-bold text-gray-500 bg-white/50 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-white transition-all shadow-sm">💬 Leave Feedback</a>
            <a href="mailto:isw360@gmail.com?subject=[Business Inquiry] Seoul District Quiz" class="text-[11px] font-bold text-gray-500 bg-white/50 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-white transition-all shadow-sm">💼 Business Inquiry</a>
        </div>
        <p class="text-[10px] text-gray-400">&copy; OpenStreetMap & CARTO</p>
    </footer>
    <script src="seoul_en.js"></script>
</body>
</html>
