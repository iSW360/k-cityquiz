<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul District Quiz | Geography Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 sm:p-6 selection:bg-indigo-200">
    <div id="difficulty-selector" class="glass-card p-6 sm:p-10 w-full max-w-lg text-center relative overflow-hidden z-10">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-indigo-500 to-purple-500"></div>

        <!-- Language Toggle -->
        <div class="absolute top-4 right-4">
            <a href="seoul.html" class="text-xs font-bold text-blue-400 hover:text-blue-600 border border-blue-200 px-2 py-1 rounded-full transition-all">🇰🇷 한국어</a>
        </div>

        <h1 class="text-3xl sm:text-4xl font-extrabold mb-2 tracking-tight text-gradient">Seoul District Quiz</h1>
        <p class="text-gray-500 font-medium mb-8">How well do you know Seoul's 25 districts?</p>

        <!-- Hero Map Image -->
        <div class="flex justify-center my-10 relative">
            <div class="relative">
                <div class="ripple-circle" style="top: 40%; left: 50%;"></div>
                <div class="ripple-circle" style="top: 40%; left: 50%; animation-delay: 1s;"></div>
                <img src="korea_seoul_map.png" alt="Map of Seoul" class="w-48 sm:w-56 h-auto drop-shadow-2xl relative z-10">
                <div class="absolute top-[40%] left-[50%] -translate-x-1/2 -translate-y-1/2 z-20">
                    <div class="bg-blue-500 p-2 rounded-full shadow-lg border-2 border-white animate-bounce">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-4">
            <button id="level-1-btn" class="btn-modern bg-white text-blue-600 border-2 border-blue-100 font-bold py-2 px-4 rounded-2xl shadow-sm">
                <span class="block text-xl">Level 1</span>
                <span class="text-xs font-medium text-gray-400">4 choices</span>
            </button>
            <button id="level-2-btn" class="btn-modern bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-2 px-4 rounded-2xl shadow-lg">
                <span class="block text-xl">Level 2</span>
                <span class="text-xs font-medium text-blue-100">8 choices</span>
            </button>
        </div>

        <!-- Daily Challenge Button -->
        <div class="mt-3">
            <button id="daily-btn" class="w-full text-sm text-gray-400 hover:text-blue-600 border border-gray-200 hover:border-blue-300 bg-white/60 hover:bg-blue-50/50 font-medium py-2 px-4 rounded-xl transition-all flex items-center justify-center gap-1.5">
                📅 Daily Challenge
            </button>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-100/50">
            <a href="index_en.html" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-indigo-600 transition-all group">
                <svg class="w-4 h-4 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l3-3m-3 3h8"/></svg>
                Back to City Quiz
            </a>
        </div>
    </div>

    <div id="quiz-container" class="glass-card p-4 sm:p-8 w-full max-w-4xl z-10" style="display: none;">
        <header class="mb-6 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gradient">Seoul Quiz In Progress</h2>
            <div id="progress-area" class="bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">
                <span class="text-sm font-bold text-blue-600"><span id="current-question">0</span> / <span id="total-questions">0</span></span>
            </div>
        </header>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7"><div id="map"></div></div>
            <div class="lg:col-span-5 flex flex-col justify-between">
                <div id="question-area" class="text-center mb-6 bg-white/50 p-4 rounded-2xl">
                    <p id="question-text" class="text-xl font-bold text-gray-800 mb-2">Where is this district?</p>
                    <button id="hint-btn" class="mx-auto text-xs bg-amber-50 text-amber-700 border border-amber-200 px-4 py-1.5 rounded-full">💡 Hint</button>
                </div>
                <div id="options-area" class="grid grid-cols-2 gap-2 mb-6"></div>
                <div id="feedback-area" class="text-center min-h-[2rem] mb-4"><p id="feedback-text" class="text-base font-bold"></p></div>
                <div class="flex gap-3">
                    <button id="restart-btn" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Restart</button>
                    <button id="next-question-btn" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl shadow-lg" style="display: none;">Next</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-16 pb-10 text-center w-full max-w-4xl z-10">
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <a href="https://tally.so/r/n0PvWl" target="_blank" class="text-[11px] font-bold text-gray-500 bg-white/50 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-white transition-all shadow-sm">💬 Leave Feedback</a>
            <a href="mailto:isw360@gmail.com?subject=[Business Inquiry] Seoul District Quiz" class="text-[11px] font-bold text-gray-500 bg-white/50 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-white transition-all shadow-sm">💼 Business Inquiry</a>
        </div>
        <p class="text-[10px] text-gray-400">&copy; OpenStreetMap & CARTO</p>
    </footer>
    <script src="seoul_en.js"></script>
</body>
</html>
